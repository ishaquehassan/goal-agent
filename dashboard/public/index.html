<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOAL AGENT // COMMAND CENTER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cp: {
              bg: '#0c0c10',
              surface: '#121218',
              border: '#2a2a3a',
              cyan: '#00d4ff',
              red: '#e83535',
              green: '#3dd83d',
              blue: '#0066ff',
              text: '#e0ddd5',
              dim: '#6a6a78',
              muted: '#3a3a4a',
            }
          },
          fontFamily: {
            display: ['"Rajdhani"', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', 'Consolas', 'monospace'],
            body: ['"Rajdhani"', '"Inter"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-cp-bg text-cp-text h-screen font-body antialiased overflow-hidden flex flex-col">

  <!-- Top Navigation: CP2077-style horizontal tabs -->
  <nav class="cp-nav">
    <div class="flex items-center h-full px-6 gap-1">
      <!-- Logo diamond -->
      <div class="cp-diamond mr-4"></div>

      <!-- Tab items -->
      <a href="#overview" class="cp-tab active" data-page="overview">CMD</a>
      <a href="#progress" class="cp-tab" data-page="progress">OPS</a>
      <a href="#calendar" class="cp-tab" data-page="calendar">INTEL</a>
      <a href="#network" class="cp-tab" data-page="network">NET</a>
      <a href="#commands" class="cp-tab" data-page="commands">TERM</a>

      <!-- Right side: system info -->
      <div class="ml-auto flex items-center gap-6">
        <span id="nav-goal-name" class="font-mono text-[11px] text-cp-dim tracking-wider uppercase"></span>
        <span id="nav-clock" class="font-mono text-[11px] text-cp-dim tracking-widest"></span>
        <div class="flex items-center gap-2">
          <span id="nav-progress" class="font-display font-bold text-sm text-cp-cyan"></span>
        </div>
        <div id="nav-status" class="flex items-center gap-1.5">
          <div class="w-1.5 h-1.5 rounded-full bg-cp-green animate-pulse"></div>
          <span class="text-[10px] font-mono text-cp-green tracking-wider uppercase">LIVE</span>
        </div>
      </div>
    </div>
    <!-- Active tab indicator line -->
    <div class="cp-tab-line"></div>
  </nav>

  <!-- Main Content Area -->
  <main class="flex-1 min-h-0 overflow-y-auto" id="main-content">
    <div id="page-overview" class="page px-8 py-6 max-w-6xl mx-auto"></div>
    <div id="page-progress" class="page hidden px-8 py-6 max-w-6xl mx-auto"></div>
    <div id="page-calendar" class="page hidden px-8 py-6 max-w-6xl mx-auto"></div>
    <div id="page-network" class="page hidden px-8 py-6 max-w-6xl mx-auto"></div>
    <div id="page-commands" class="page hidden px-4 py-2"></div>
    <div id="page-empty" class="page hidden px-8 py-6 max-w-3xl mx-auto"></div>
  </main>

  <!-- Bottom Action Bar: CP2077-style controller hints -->
  <footer class="cp-bottom-bar">
    <div class="flex items-center justify-between px-6 h-full">
      <div class="flex items-center gap-6">
        <span id="sidebar-days" class="font-display font-bold text-cp-cyan">0</span>
        <span class="text-[10px] font-mono text-cp-dim uppercase tracking-wider">DAYS</span>
        <span class="text-cp-muted">|</span>
        <span id="sidebar-streak" class="font-display font-bold text-cp-red">0</span>
        <span class="text-[10px] font-mono text-cp-dim uppercase tracking-wider">STREAK</span>
      </div>
      <div class="flex items-center gap-6">
        <div class="cp-hint"><span class="cp-hint-key">Ctrl+K</span> Search</div>
        <div class="cp-hint"><span class="cp-hint-key">Enter</span> Execute</div>
        <div class="cp-hint"><span class="cp-hint-key">Esc</span> Close</div>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/js/components/overview.js"></script>
  <script src="/js/components/progress.js"></script>
  <script src="/js/components/calendar.js"></script>
  <script src="/js/components/contacts.js"></script>
  <script src="/js/components/commands.js"></script>
  <script src="/js/components/empty.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
